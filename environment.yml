name: braincoder
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.12
  - pip
  - pip:
    # Keras 3 + backends (all three included; set KERAS_BACKEND to select one)
    - keras>=3.13
    - tensorflow>=2.20
    - tensorflow-probability>=0.25
    - tf_keras>=2.20
    - jax[cpu]>=0.9
    - torch>=2.10
    # JAX-based MCMC
    - blackjax>=1.0
    # Statistics (circular correlation used in decode2d example)
    - pingouin
    # Neuroimaging (required for fit_prf and decode_visual examples)
    - nilearn
    # Dev / notebook tools
    - jupyter
    - ipykernel
    # Installs braincoder + all core deps (numpy, pandas, scipy, etc.) + pytest
    - "-e .[test]"
